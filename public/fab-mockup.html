<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>FAB Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f13;
    color: #fff;
    font-family: -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ヘッダー */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(15,15,19,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .howto-btn {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.07);
  }
  .fab {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.07);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }
  .fab svg {
    width: 17px;
    height: 17px;
    fill: rgba(255,255,255,0.6);
  }
  .fab .plus {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #1DB954;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ページ内容（ダミー） */
  .content {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .thumb {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .card-text .title { font-size: 13px; font-weight: 600; }
  .card-text .sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; }

  /* ボトムナビ */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(15,15,19,0.95);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 0;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    border: none;
    background: none;
    cursor: pointer;
  }
  .nav-item.active { color: #a78bfa; }
  .nav-icon {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<header>
  <button class="howto-btn">使い方</button>
  <span class="logo">ryuryu</span>
  <button class="fab">
    <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    <span class="plus">
      <svg width="6" height="6" viewBox="0 0 6 6" fill="none">
        <line x1="3" y1="1.5" x2="3" y2="4.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
        <line x1="1.5" y1="3" x2="4.5" y2="3" stroke="white" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </span>
  </button>
</header>

<div class="content">
  <div class="card"><div class="thumb"></div><div class="card-text"><div class="title">Album Title</div><div class="sub">Artist Name</div></div></div>
  <div class="card"><div class="thumb"></div><div class="card-text"><div class="title">Album Title</div><div class="sub">Artist Name</div></div></div>
  <div class="card"><div class="thumb"></div><div class="card-text"><div class="title">Album Title</div><div class="sub">Artist Name</div></div></div>
</div>

<nav>
  <button class="nav-item active">
    <div class="nav-icon"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    ホーム
  </button>
  <button class="nav-item">
    <div class="nav-icon"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    タイムライン
  </button>
  <button class="nav-item">
    <div class="nav-icon"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    マイページ
  </button>
</nav>

</body>
</html>
